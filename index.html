<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dapper Dan’s Boutique</title>
    <link rel="preload" as="image" href="assets/dapper-dans-boutique.png" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="artboard">
      <img
        src="assets/dapper-dans-boutique.png"
        width="1448"
        height="1086"
        alt="Illustrated streetscape outside Dapper Dan’s Boutique"
      />
      <div class="actor actor-suit" data-actor="suit" data-offset="0" aria-label="A sharply dressed passerby" role="img">
        <img src="assets/characters/suit-strip.png" alt="" />
      </div>
      <div class="actor actor-floral" data-actor="floral" aria-label="A woman in a black floral dress gesturing" role="img">
        <img src="assets/characters/floral-strip.png" alt="" />
      </div>
      <div class="actor actor-dancer" data-actor="dancer" aria-label="A dancer in a red tracksuit" role="img">
        <img src="assets/characters/dancer-strip.png" alt="" />
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
